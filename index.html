        let currentActiveId = null;

        function initSidebar() {
            const nav = document.getElementById('sidebar-nav');
            let html = '';
            
            sections.forEach((sec, index) => {
                html += `
                    <button 
                        onclick="loadSection('${sec.id}')"
                        id="nav-btn-${sec.id}"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group text-left
                               hover:bg-slate-800 hover:text-white"
                    >
                        <div class="text-slate-500 group-hover:text-brandGreen transition-colors" id="nav-icon-${sec.id}">
                            ${sec.icon}
                        </div>
                        <span class="font-medium text-sm tracking-wide">${sec.navTitle}</span>
                    </button>
                `;
            });
            
            nav.innerHTML = html;
        }

        function loadSection(id) {
            const section = sections.find(s => s.id === id);
            if (!section || currentActiveId === id) return;

            // Update Active State in Sidebar
            if (currentActiveId) {
                const prevBtn = document.getElementById(`nav-btn-${currentActiveId}`);
                const prevIcon = document.getElementById(`nav-icon-${currentActiveId}`);
                prevBtn.classList.remove('bg-brandBlue', 'text-white', 'shadow-md');
                prevBtn.classList.add('hover:bg-slate-800');
                prevIcon.classList.replace('text-white', 'text-slate-500');
            }

            const activeBtn = document.getElementById(`nav-btn-${id}`);
            const activeIcon = document.getElementById(`nav-icon-${id}`);
            activeBtn.classList.add('bg-brandBlue', 'text-white', 'shadow-md');
            activeBtn.classList.remove('hover:bg-slate-800');
            activeIcon.classList.replace('text-slate-500', 'text-white');
            activeIcon.classList.remove('group-hover:text-brandGreen');

            currentActiveId = id;

            // Update Topbar
            document.getElementById('topbar-title').innerText = section.title;
            document.getElementById('topbar-subtitle').innerText = section.subtitle;

            // Update Main Content with Animation
            const container = document.getElementById('dynamic-content');
            
            // Remove animation class to reset
            container.classList.remove('fade-in-up');
            
            // Force reflow
            void container.offsetWidth;
            
            container.innerHTML = section.content;
            container.classList.add('fade-in-up');

            if (id === 'simulador') {
                initSimulador();
            }

            // Scroll to top of main area
            document.getElementById('main-content-area').scrollTop = 0;
        }

        const universalSet = [
            "LandingScreen", "Ayuda", "Cartelera", "MisTutorias", 
            "Perfil", "SugerirTutoria", "TableroTutor", "DetalleClase", 
            "Metricas", "TribunalBaneos"
        ];

        function initSimulador() {
            const containerA = document.getElementById('sim-checkboxes-a');
            const containerB = document.getElementById('sim-checkboxes-b');
            if(!containerA || !containerB) return;
            
            if(containerA.children.length > 0) return; // Ya inicializado

            let htmlA = '';
            let htmlB = '';

            universalSet.forEach((pantalla, index) => {
                htmlA += `
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-200 p-1.5 rounded transition-colors group">
                        <input type="checkbox" id="sim-a-${index}" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 border-slate-300">
                        <span class="truncate text-slate-700 group-hover:text-slate-900 font-medium">${pantalla}</span>
                    </label>`;
                htmlB += `
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-200 p-1.5 rounded transition-colors group">
                        <input type="checkbox" id="sim-b-${index}" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500 border-slate-300">
                        <span class="truncate text-slate-700 group-hover:text-slate-900 font-medium">${pantalla}</span>
                    </label>`;
            });

            containerA.innerHTML = htmlA;
            containerB.innerHTML = htmlB;
        }

        function simularOperacion(operacion) {
            const vecA = [];
            const vecB = [];
            const vecResult = [];
            const resultPantallas = [];

            // 1. Obtener Vectores Binarios (Función Característica)
            for (let i = 0; i < universalSet.length; i++) {
                vecA[i] = document.getElementById(`sim-a-${i}`).checked ? 1 : 0;
                vecB[i] = document.getElementById(`sim-b-${i}`).checked ? 1 : 0;

                // 2. Operación Lógica Bit a Bit
                if (operacion === 'union') {
                    vecResult[i] = vecA[i] | vecB[i];
                } else if (operacion === 'interseccion') {
                    vecResult[i] = vecA[i] & vecB[i];
                } else if (operacion === 'diferencia') {
                    vecResult[i] = vecA[i] & (~vecB[i] & 1); // A - B => A AND NOT B
                } else if (operacion === 'simetrica') {
                    vecResult[i] = vecA[i] ^ vecB[i]; // XOR
                }

                // 3. Decodificar Vector Resultante a Pantallas Naturales
                if (vecResult[i] === 1) {
                    resultPantallas.push(universalSet[i]);
                }
            }

            // 4. Actualizar Interfaz (Resultados)
            document.getElementById('sim-resultados').style.display = 'block';
            
            const titles = {
                'union': 'Unión ( A ∪ B )',
                'interseccion': 'Intersección ( A ∩ B )',
                'diferencia': 'Comp. Relativo ( A - B )',
                'simetrica': 'Diferencia Simétrica ( A Δ B )'
            };
            document.getElementById('sim-titulo-op').innerText = `Resultado: ${titles[operacion]}`;

            // Renderizar cuadritos de bits
            const renderVec = (vec, colorClass) => vec.map(b => `<div class="w-8 h-8 flex items-center justify-center rounded text-sm font-bold transition-all ${b ? colorClass : 'bg-slate-800 text-slate-500 border border-slate-700'}">${b}</div>`).join('');

            document.getElementById('sim-vec-a').innerHTML = renderVec(vecA, 'bg-blue-600 text-white shadow-[0_0_8px_rgba(37,99,235,0.4)]');
            document.getElementById('sim-vec-b').innerHTML = renderVec(vecB, 'bg-emerald-600 text-white shadow-[0_0_8px_rgba(5,150,105,0.4)]');
            document.getElementById('sim-vec-r').innerHTML = renderVec(vecResult, 'bg-amber-500 text-slate-900 shadow-[0_0_12px_rgba(245,158,11,0.6)] scale-110');

            document.getElementById('sim-pantallas-r').innerText = resultPantallas.length > 0 
                ? `{ ${resultPantallas.join(', ')} }`
                : '∅ (Conjunto Vacío)';
        }

        // Init
        window.onload = () => {
            initSidebar();
            // Load first section
            loadSection(sections[0].id);
        };
